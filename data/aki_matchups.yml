- "character": "春麗"
  "status": "検証中"
  "tags":
  - "地上戦"
  - "気功拳"
  - "覇山蹴"
  - "構え"
  "overview": |-
    いつもの地上戦を立ち中K軸で行う。
    ドライブゲージは節約気味にし、OD紫煙砲などで無理に攻めない。
    守り気味に戦い、春麗側に攻めさせる。
    投げは受け入れてよい。特に画面中央では割り切る。
  "watch_out":
  - "中段。"
  - "三角飛び。"
  - "飛びつつ回り込む、めくり強攻撃（3強K）。"
  - "春麗の立ち強Pが差し返しになる行動。"
  "punish":
  - "覇山蹴は弱-9F、中-3F、強-1F、OD-5F。"
  - "前強Kはガードで-4F。"
  "effective_options":
  - "前投げから弱または中気功拳の場合、その場受け身からインパクト確定。SA3なら強気功拳にも確定する。"
  - "構えから弱攻撃、気功拳の場合、構えを見てからインパクト。ただし読みで利用する。"
  - "中足からの弾をジャストパリィできると、反撃手段が増える。"
  - "覇山蹴はジャストパリィ。距離によっては立ち中Pが噛み合う。"
  - "弱気功拳を少し引き付け、OD紫煙砲で上書きするように返すと、こちらのペースにしやすい。"
