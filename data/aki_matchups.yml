  "overview": "相手の出方次第では前ジャンプ、生ラッシュ多めでも可。溜めワールなどに対する弾抜け猛毒牙を意識させるため、伏せ置きなども選択肢に入れる。終盤に差し掛かるにつれて弾抜けのスライディングを警戒した立ち回りを意識する。"
