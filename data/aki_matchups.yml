- "character": "リリー"
  "status": "検証中"
  "tags":
  - "風"
  - "スパイア"
  - "起き攻め"
  - "Dリバ"
  - "差し返し"
  "overview": "風を溜めさせない意識を持ち、SAゲージ状況と風ストックに応じて起き攻め・Dリバ・差し返しを使い分ける。"
  "watch_out":
  - "風利用通常スパイアガード時は+1F。読み合いとしてジャストパリィ、5弱K暴れ、早投げなどの選択もOK。"
  - "風利用ODスパイアガード時は早めのDリバで拒否推奨。"
  - "風が1つでもある場合、こちらの詐欺飛びに対しリリーの通常昇竜が勝つので注意。空かし飛びは大丈夫。"
  "punish":
  - "風無しスパイアが食い込んで当たった場合に確定反撃があるが、当たり方でフレームが変わる。"
  "effective_options":
  - "SA3が溜まるまでは9F詐欺の起き攻めが有効。"
  - "2強Pから風溜め系統にSAが入るケースあり。トレモで感覚練習したのち投入すべき。"
  - "弱技3発から弱スパイアの場合はバックジャンプでフルコン可能。"
  - "風利用ODスパイアはDリバで拒否。打ち出しを予測できる場合は蛇連咬で対応が可能。"
  "notes": |
    SA1は発生10F、SA2は発生9F、SA3は発生7F（投げ属性）。
    風溜めさせない意識は大事。弱蛇頭鞭 or ラッシュは場所に応じて使用。弱蛇頭鞭が届く距離をキープする。
    リリー側の2強P or 6強Pに対する差し返しは、近ければ2強Pや2強Kでトライ可能。相手の技次第では2中Pでもいけるかも。
    理想は風を溜められる前に体力リードを作りたい。
