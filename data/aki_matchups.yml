- "character": "ジェイミー"
  "status": "検証中"
  "tags":
  - "酒"
  - "無影蹴"
  - "流酔拳"
  - "ドライブリバーサル"
  "overview": |-
    なるべく1杯目を飲ませない。
    初手のOD昇竜をガードした後は、インパクト始動コンボでドライブゲージを奪うことでリードを作りやすい。
  "watch_out":
  - "すかし飛びからのしゃがみ中K先端当て。"
  - "酒2杯目からの弾抜け行動。"
  - "酒3杯目からのコマンド投げ。"
  - "弾を飛び越えての飛び降り。"
  "punish":
  - "OD昇竜ガード後は、インパクト始動まで可能。"
  - "流酔拳一段目止めに対し、近ければ立ち中Pから反撃できる。"
  "effective_options":
  - "ラッシュ強Pガード時は微下がりからしゃがみガード。中足はガードし、投げは範囲外になる。"
  - "後ろ投げからの酒飲みには、その場受け身からラッシュ立ち中Pか前強K。酒4杯目に限り、その場受け身からしゃがみ強KキャンセルSA。"
  - "キャンセルラッシュからのコマンド投げをケアするため、ドライブリバーサルを意識する。"
  - "前投げ、前ステップ、OD無影蹴の連携には、ファジー前歩きか強K暴れ。特に最終局面で意識する。"
  - "強Pへの打ち返しは、しゃがみ弱Pを数発当ててからバックステップすると+10F。強Kやしゃがみ強Kで反撃する。"
