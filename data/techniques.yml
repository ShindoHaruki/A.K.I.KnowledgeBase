version: "2026-06-14"
items:
  - title: "しゃがみ中Pシミー"
    summary: "なるべく密着で+30～32Fから、しゃがみ中P空振り→そのまましゃがんでいると通常投げ間合い外になる上、投げたいときはそのまま行ける。"
    merits:
      - "後ろ下がりでのシミーでは無いため、逆択中足ラッシュも防ぐことが可能。"
    demerits:
      - "ザンギとマリーザには基本不可能。"
    references:
      - title: "しゃがみ中Pシミー 参考動画"
        url: "https://youtu.be/SSQ7V8USHog"
        note: "重ね方と距離感の確認用。"
    notes: |
      画面端の毒無し強鞭〆→立弱P空振り→しゃがみ中P空振りが一番やりやすい。

  - title: "10F詐欺"
    summary: "+6Fから2弱K重ね、+17Fから最速ラッシュ2弱K重ね。"
    merits:
      - "発生10Fまでの無敵技を詐欺しつつ重ねが可能。"
      - "ラッシュ重ねの場合、打撃と投げとシミー（投げ間合い普通限定）の3択が可能。"
    demerits: []
    references:
      - title: "10F詐欺 参考動画"
        url: "https://youtu.be/hwOzCHhcs3Q"
        note: "代表例や重ね方の確認用。"
    notes: |
      代表的なのはアキやベガのSA1とSA3、エドのSA1とSA3とODサイコアッパー、リリーのSA1など。

  - title: "9F詐欺"
    summary: "+5Fから5弱P重ね、+16Fから最速ラッシュ5弱P重ね。"
    merits:
      - "発生9Fまでの無敵技を詐欺しつつ重ねが可能。"
      - "ラッシュ重ねの場合、打撃と投げとシミー（投げ間合い普通限定）の3択が可能。"
    demerits:
      - "ラッシュで重ねない場合は少し弱い択になる。"
    references:
      - title: "9F詐欺 参考動画"
        url: "https://youtu.be/QsBs-jJHUT4"
        note: "代表例や重ね方の確認用。"
    notes: |
      代表的なのはキャミィのSA1とSA3、マリーザのSA2、リリーのSA2など。

  - title: "五分打ち"
    summary: "+-0Fでの通常技重ね、+11Fから最速ラッシュ4Fの重ねについて。"
    merits:
      - "0F: 相手がSAを打った際に、直前で放った通常技をパリィに上書きできる。"
      - "+11F: SAもしくはOD蛇軽功にキャンセルが可能。"
    demerits:
      - "0Fの方はシンプルにやりやすい。"
      - "+11Fを利用する場合、相手キャラとどのSAを放つかによって、SAを返すかOD蛇軽功で抜けるか、そもそもダメなのかなどが変わるため下調べが必要。"
    references:
      - title: "五分打ち 参考動画"
        url: "https://youtu.be/DLq6j0jxytE"
        note: "実戦投入前に状況と相手SAごとの対応を確認する。"
    notes: |
      ヴァイパーまでは自身ですべて調べてあるので、今後追記予定。

template:
  title: "テクニック名"
  summary: "どんな場面で使うテクニックかを書く。"
  merits:
    - "成功した時のリターン"
    - "相手に意識させられること"
  demerits:
    - "失敗した時のリスク"
    - "有効ではない相手行動"
  references:
    - title: "参考動画や資料"
      url: "https://www.youtube.com/watch?v=..."
      note: "YouTubeのURLを入れると、対応している形式なら動画を埋め込み表示できます。"
  notes: |
    補足、検証メモ、入力精度、キャラ限定など。
